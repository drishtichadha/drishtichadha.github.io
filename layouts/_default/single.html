<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
  </head>
  <body>
    <div class="container">
      <div class="site-header">
        <div class="logo">HS</div>
        <div>
          <h1 class="title">{{ .Site.Title | default "My New Hugo Project" }}</h1>
          <p class="subtitle">{{ .Site.Params.description | default "A simple Hugo site" }}</p>
        </div>
      </div>

      <div class="card">
        <div class="cover-image">
          <img src="/images/placeholder-hero.svg" alt="Placeholder image" />
        </div>
        <h2 class="post-title">{{ .Title }}</h2>
        <div class="meta">{{ .Date.Format "Jan 2, 2006" }}</div>
        <article>
          {{ .Content }}
        </article>
      </div>

      <footer>
        <p>Made with ❤ — Generated by Hugo</p>
      </footer>
    </div>
  </body>
</html>
